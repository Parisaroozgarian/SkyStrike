<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Threat Simulator - Error {{ error_code }}</title>
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/professional.css') }}" rel="stylesheet">
</head>
<body class="professional-theme">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6">
                <div class="card professional-card error-state">
                    <div class="card-header text-center">
                        <h1 class="display-4 text-danger mb-0">
                            <i class="fas fa-exclamation-triangle me-3"></i>{{ error_code }}
                        </h1>
                    </div>
                    <div class="card-body text-center">
                        <h4 class="card-title mb-3">System Error</h4>
                        <p class="card-text mb-4">{{ error_message }}</p>
                        
                        <div class="d-flex justify-content-center gap-3">
                            <a href="/" class="btn btn-primary">
                                <i class="fas fa-home me-2"></i>Return to Dashboard
                            </a>
                            <button class="btn btn-secondary" onclick="history.back()">
                                <i class="fas fa-arrow-left me-2"></i>Go Back
                            </button>
                        </div>
                        
                        <div class="mt-4">
                            <small class="text-muted">
                                If this error persists, please contact system administration.
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
